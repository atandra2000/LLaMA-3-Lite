[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
    ignore::ResourceWarning
addopts =
    -ra
    --strict-markers
    --strict-config
    -p no:cacheprovider
markers =
    slow: tests that take more than a few seconds
    gpu: tests that require a CUDA GPU
    smoke: fast smoke tests covering the end-to-end pipeline
    numeric: tests asserting numerical equivalence between implementations